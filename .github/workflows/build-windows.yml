name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    # Explicitly using windows-2025 to avoid the redirection notice
    runs-on: windows-2025

    steps:
      # Updated to v4.2.2+ (verified Node 24 compatibility)
      - uses: actions/checkout@v4

      # Updated to v5 (Standard for Node 24+ environments)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab==4.5.0 pyinstaller==6.20.0 svglib==1.5.1 pillow==12.2.0

      - name: Ensure valid Windows icon
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          ico = Path("assets/icon.ico")
          png = Path("assets/icon.png")

          def is_valid_ico(path: Path) -> bool:
            try:
              with Image.open(path) as im:
                return im.format == "ICO"
            except Exception:
              return False

          if not is_valid_ico(ico):
            if not png.exists():
              raise FileNotFoundError("assets/icon.png not found: cannot generate icon.ico")
            with Image.open(png) as src:
              src = src.convert("RGBA")
              side = max(src.size)
              canvas = Image.new("RGBA", (side, side), (0, 0, 0, 0))
              offset = ((side - src.width) // 2, (side - src.height) // 2)
              canvas.paste(src, offset)
              canvas.save(
                ico,
                format="ICO",
                sizes=[(16, 16), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
              )
            print("Generated valid assets/icon.ico from assets/icon.png")
          else:
            print("assets/icon.ico is already valid")
          PY

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Preventivatore `
            --icon=assets/icon.ico `
            --add-data "assets;assets" `
            main.py

      # Using v4 (Ensure you are on the latest minor release for Node 24 support)
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Preventivatore-Windows
          path: dist/Preventivatore.exe
          retention-days: 90