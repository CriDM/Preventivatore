name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab==4.5.0 pyinstaller==6.20.0 svglib==1.5.1

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Preventivatore `
            --icon=assets/icon.ico `
            --add-data "assets;assets" `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v3
        with:
          name: Preventivatore-Windows
          path: dist/Preventivatore.exe
          retention-days: 90

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: Preventivatore Build ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/Preventivatore.exe
          asset_name: Preventivatore.exe
          asset_content_type: application/octet-stream
