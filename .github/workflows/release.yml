name: Release (on Tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Explicitly set to windows-2025 to avoid the "redirection" notice
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      # Updated to v5 for Node 24 compatibility
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab==4.5.0 pyinstaller==6.20.0 svglib==1.5.1 pillow==12.2.0

      - name: Ensure valid Windows icon
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          ico = Path("assets/icon.ico")
          png = Path("assets/icon.png")

          def is_valid_ico(path: Path) -> bool:
            try:
              with Image.open(path) as im:
                return im.format == "ICO"
            except Exception:
              return False

          if not is_valid_ico(ico):
            if not png.exists():
              raise FileNotFoundError("assets/icon.png not found")
            with Image.open(png) as src:
              src = src.convert("RGBA")
              side = max(src.size)
              canvas = Image.new("RGBA", (side, side), (0, 0, 0, 0))
              offset = ((side - src.width) // 2, (side - src.height) // 2)
              canvas.paste(src, offset)
              canvas.save(
                ico,
                format="ICO",
                sizes=[(16, 16), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
              )
            print("Generated assets/icon.ico")
          else:
            print("assets/icon.ico already valid")
          PY

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Preventivatore `
            --icon=assets/icon.ico `
            --add-data "assets;assets" `
            main.py

      # Updated to v2 to fix the Node 20 deprecation error
      - name: Create GitHub Release with Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Preventivatore.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}